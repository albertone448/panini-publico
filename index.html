<style>
  :root {
    --bg: #0a0c0f;
    --surface: #13161c;
    --surface2: #1a1e27;
    --border: #252a35;
    --border2: #2f3545;
    --text: #e8eaf0;
    --text2: #8891a8;
    --text3: #4f5668;
    --green-bg: #052011;
    --accent: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: var(--accent); }
  .logo span { color: var(--text2); font-size: 14px; font-family: 'DM Mono', monospace; margin-left: 8px; }
  .header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* MAIN */
  .main { padding: 16px; max-width: 960px; margin: 0 auto; }

  /* SEARCH + CHECK */
  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .search-box h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text2); }
  input[type="text"], textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--text);
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.12s;
    margin-bottom: 10px;
  }
  textarea { resize: vertical; min-height: 70px; font-family: 'DM Mono', monospace; font-size: 12px; margin-bottom: 10px; }
  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--text3); }
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    width: 100%;
    transition: background 0.12s;
  }
  .btn:hover { background: #ea580c; }

  /* CHECK RESULTS */
  .check-result {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-radius: 7px;
    margin-bottom: 6px;
    border: 1px solid transparent;
  }
  .check-result.have { background: #052011; border-color: rgba(22,163,74,0.25); }
  .check-result.none { background: #1a0505; border-color: rgba(220,38,38,0.2); }
  .check-result.invalid { background: var(--surface); border-color: var(--border); }
  .cr-left { display: flex; flex-direction: column; gap: 2px; }
  .cr-code { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; }
  .cr-name { font-size: 11px; color: var(--text3); }
  .cr-status { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; }
  .have .cr-status { color: #4ade80; }
  .none .cr-status { color: #f87171; }
  .invalid .cr-status { color: var(--text3); }

  /* FILTERS */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text3);
    white-space: nowrap;
    transition: all 0.12s;
    user-select: none;
  }
  .chip.active { background: var(--accent); color: #fff; border-color: #ea580c; }
  .chip:hover:not(.active) { color: var(--text); border-color: var(--text3); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* TEAM BLOCKS */
  .inv-container { max-height: 70vh; overflow-y: auto; padding-right: 4px; }
  .inv-container::-webkit-scrollbar { width: 4px; }
  .inv-container::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .team-block {
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .team-header {
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .team-name { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .team-code {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    background: var(--border);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .team-avail { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }

  .sticker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
    gap: 4px;
    padding: 10px;
  }
  .sticker {
    padding: 6px 4px;
    border-radius: 6px;
    text-align: center;
    border: 1px solid transparent;
    position: relative;
  }
  .sticker.have { background: #052011; border-color: rgba(22,163,74,0.3); }
  .sticker.none { background: #111318; border-color: rgba(255,255,255,0.05); }
  .sticker-code {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    display: block;
    margin-bottom: 2px;
  }
  .sticker.have .sticker-code { color: #4ade80; }
  .sticker.none .sticker-code { color: var(--text3); }
  .sticker-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }
  .sticker.have .sticker-dot { background: rgba(22,163,74,0.5); }
  .sticker.none .sticker-dot { background: rgba(255,255,255,0.08); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }

  /* LOADING */
  .loading { text-align: center; padding: 60px 20px; color: var(--text3); }
  .loading-dot { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); letter-spacing: 2px; }

  /* CONTACT HINT */
  .contact-hint {
    text-align: center;
    margin-top: 20px;
    margin-bottom: 20px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .contact-hint p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 12px;
  }
  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #128C7E;
    color: #fff;
    text-decoration: none;
    padding: 11px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.12s;
  }
  .wa-btn:hover { background: #0f7a6d; }

  /* BOTÓN FLOTANTE */
  .wa-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #128C7E;
    color: #fff;
    text-decoration: none;
    padding: 12px 18px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: background 0.12s, transform 0.12s;
  }
  .wa-float:hover { background: #0f7a6d; transform: translateY(-2px); }
  .wa-float-text { display: block; }
  @media (max-width: 480px) {
    .wa-float-text { display: none; }
    .wa-float { padding: 14px; border-radius: 50%; font-size: 22px; }
  }

  @media (max-width: 500px) {
    .sticker-grid { grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); }
  }
</style>

  const TEAM_NAMES  = {"FWC":"FIFA World Cup","ALG":"Argelia","ARG":"Argentina","AUS":"Australia","AUT":"Austria","BEL":"Bélgica","BIH":"Bosnia y Herzegovina","BRA":"Brasil","CAN":"Canadá","CIV":"Costa de Marfil","COD":"Congo DR","COL":"Colombia","CPV":"Cabo Verde","CRO":"Croacia","CUW":"Curazao","CZE":"República Checa","ECU":"Ecuador","EGY":"Egipto","ENG":"Inglaterra","ESP":"España","FRA":"Francia","GER":"Alemania","GHA":"Ghana","HAI":"Haití","IRN":"Irán","IRQ":"Irak","JOR":"Jordania","JPN":"Japón","KOR":"Corea del Sur","KSA":"Arabia Saudita","MAR":"Marruecos","MEX":"México","NED":"Países Bajos","NOR":"Noruega","NZL":"Nueva Zelanda","PAN":"Panamá","PAR":"Paraguay","POR":"Portugal","QAT":"Qatar","RSA":"Sudáfrica","SCO":"Escocia","SEN":"Senegal","SUI":"Suiza","SWE":"Suecia","TUN":"Túnez","TUR":"Turquía","URU":"Uruguay","USA":"Estados Unidos","UZB":"Uzbekistán"};

  // Build team → stickers map
  const TEAM_STICKERS = {};
  TEAMS_ORDER.forEach(tc => {
    TEAM_STICKERS[tc] = Object.entries(STICKER_DATA)
      .filter(([, s]) => s.team === tc)
      .map(([code, s]) => ({ code, name: s.name }));
  });

  // App state
  let inventory  = {};
  let currentFilter = 'todos';
  let searchVal = '';

  // Load inventory from Firebase (real-time)
  onValue(ref(db, 'inventory'), snap => {
    inventory = snap.val() || {};
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('invContainer').style.display = 'block';
    renderInventory();
  });

  // Render
  window.handleSearch = function() {
    searchVal = document.getElementById('searchInput').value.toLowerCase();
    renderInventory();
  };

  window.setFilter = function(f, el) {
    currentFilter = f;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderInventory();
  };

  function renderInventory() {
    const container = document.getElementById('invContainer');
    let html = '';

    TEAMS_ORDER.forEach(tc => {
      const teamName = TEAM_NAMES[tc];
      const stickers = TEAM_STICKERS[tc];

      // Search filter
      if (searchVal) {
        const teamMatch = teamName.toLowerCase().includes(searchVal) || tc.toLowerCase().includes(searchVal);
        const stickerMatch = stickers.some(s =>
          s.code.toLowerCase().includes(searchVal) || s.name.toLowerCase().includes(searchVal)
        );
        if (!teamMatch && !stickerMatch) return;
      }

      let filtered = stickers;

      // Availability filter
      if (currentFilter === 'disponibles') {
        filtered = filtered.filter(s => (inventory[s.code]?.qty ?? 0) > 0);
      }

      if (!filtered.length) return;

      const availCount = stickers.filter(s => (inventory[s.code]?.qty ?? 0) > 0).length;

      html += `<div class="team-block">
        <div class="team-header">
          <div class="team-name">${teamName}<span class="team-code">${tc}</span></div>
          <div class="team-avail">${availCount}/${stickers.length}</div>
        </div>
        <div class="sticker-grid">`;

      filtered.forEach(s => {
        const avail = (inventory[s.code]?.qty ?? 0) > 0;
        html += `<div class="sticker ${avail ? 'have' : 'none'}" title="${s.name}">
          <span class="sticker-code">${s.code}</span>
          <span class="sticker-dot"></span>
        </div>`;
      });

      html += `</div></div>`;
    });

    if (!html) {
      html = `<div class="empty-state"><div class="empty-icon">🔍</div>No hay resultados</div>`;
    }

    container.innerHTML = html;
  }

  // Check codes
  window.checkCodes = function() {
    const raw = document.getElementById('checkInput').value;
    const codes = raw.split(/[\n,]+/).map(c => c.trim().toUpperCase()).filter(Boolean);
    if (!codes.length) return;

    const disponibles = [];
    const noDisponibles = [];
    const invalidos = [];

    codes.forEach(code => {
      const data = STICKER_DATA[code];
      if (!data) { invalidos.push({ code }); return; }
      const inv   = inventory[code] || { qty: 0, price: 150 };
      const avail = inv.qty > 0;
      const price = inv.price ?? 150;
      const item  = { code, name: data.name, teamName: data.teamName, price };
      avail ? disponibles.push(item) : noDisponibles.push(item);
    });

    const total = disponibles.reduce((s, r) => s + r.price, 0);

    let html = '';

    // DISPONIBLES
    if (disponibles.length > 0) {
      html += `<div style="font-size:12px;font-weight:600;color:#4ade80;margin-bottom:8px;margin-top:4px">✅ Disponibles</div>`;
      disponibles.forEach(r => {
        html += `<div class="check-result have">
          <div class="cr-left">
            <span class="cr-code">${r.code}</span>
            <span class="cr-name">${r.name} · ${r.teamName}</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
            <span class="cr-status">✓ Disponible</span>
            <span style="font-family:'DM Mono',monospace;font-size:12px;color:#f97316;font-weight:600">₡${r.price.toLocaleString()}</span>
          </div>
        </div>`;
      });

      // Total
      html += `<div style="display:flex;justify-content:space-between;padding:10px 14px;background:#1a1e27;border:1px solid #2f3545;border-radius:8px;margin:8px 0 14px;font-family:'DM Mono',monospace;font-weight:700;font-size:15px;color:#f97316">
        <span>Total (${disponibles.length} postal${disponibles.length===1?'':'es'})</span>
        <span>₡${total.toLocaleString()}</span>
      </div>`;
    }

    // NO DISPONIBLES
    if (noDisponibles.length > 0) {
      html += `<div style="font-size:12px;font-weight:600;color:#f87171;margin-bottom:8px">❌ No disponibles</div>`;
      noDisponibles.forEach(r => {
        html += `<div class="check-result none">
          <div class="cr-left">
            <span class="cr-code">${r.code}</span>
            <span class="cr-name">${r.name} · ${r.teamName}</span>
          </div>
          <span class="cr-status">✗ No disponible</span>
        </div>`;
      });
      html += `<div style="margin-bottom:14px"></div>`;
    }

    // INVÁLIDOS
    if (invalidos.length > 0) {
      html += `<div style="font-size:12px;font-weight:600;color:#4f5668;margin-bottom:8px">⚠️ Códigos no válidos</div>`;
      invalidos.forEach(r => {
        html += `<div class="check-result invalid">
          <div class="cr-left"><span class="cr-code">${r.code}</span><span class="cr-name">No existe en el álbum</span></div>
          <span class="cr-status">—</span>
        </div>`;
      });
      html += `<div style="margin-bottom:14px"></div>`;
    }

    // BOTÓN WHATSAPP (solo si hay disponibles)
    if (disponibles.length > 0) {
      const codigosLista = disponibles.map(r => r.code).join(', ');

      const lineas = [];
      lineas.push('Hola! Me interesa comprar estas postales:');
      lineas.push('');
      disponibles.forEach(r => {
        lineas.push(`  • ${r.code} — ${r.name} (₡${r.price.toLocaleString()})`);
      });
      lineas.push('');
      lineas.push(`Total: ₡${total.toLocaleString()}`);
      lineas.push('');
      lineas.push(`Códigos: ${codigosLista}`);

      const mensaje = encodeURIComponent(lineas.join('\n'));
      const waUrl   = `https://wa.me/50685109300?text=${mensaje}`;

      html += `<a href="${waUrl}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;background:#128C7E;color:#fff;text-decoration:none;padding:13px 20px;border-radius:8px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;transition:background 0.12s" onmouseover="this.style.background='#0f7a6d'" onmouseout="this.style.background='#128C7E'">
        💬 Enviarme mi lista por WhatsApp
      </a>`;
    }

    document.getElementById('checkResults').innerHTML = html;
  };
</script>
</body>
</html>
